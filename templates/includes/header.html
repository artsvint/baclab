<header class="site-header">
    <a class="brand-block" href="{{ url_for('main.index') if current_user else url_for('auth.auth_page') }}">
        <div class="brand-icon">✳</div>
        <div>
            <div class="brand-title">{{ app_name }}</div>
            <div class="brand-subtitle">Бактериологическая лаборатория КГБУЗ ККПТД № 1</div>
        </div>
    </a>

    <nav class="top-nav">
        {% if current_user %}
            <a href="{{ url_for('main.index') }}">Картотека</a>
            {% if can_admin %}
                <a href="{{ url_for('references.references_page') }}">Справочники</a>
                <a href="{{ url_for('users.users_list') }}">Пользователи</a>
            {% endif %}
        {% endif %}
    </nav>

    <div class="auth-zone">
        {% if current_user %}
            <div class="user-badge">
                <span>{{ current_user.FULL_NAME }}</span>
                <small>{{ current_user.ROLE_NAME }}</small>
            </div>
            <a class="button ghost" href="{{ url_for('auth.logout') }}">Выйти</a>
        {% else %}
            <button class="button ghost" type="button" data-open-modal="loginModal">Войти</button>
            <button class="button primary" type="button" data-open-modal="registerModal">Регистрация</button>
        {% endif %}
    </div>
</header>
